name: Node CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  IMAGE_TAG: sha-${{ github.sha }}

jobs:
  build:
    name: Build and image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.2

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck package closure
        run: pnpm check

      - name: Prepare image metadata
        id: image
        run: |
          owner_lc="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "name=ghcr.io/${owner_lc}/cogni-node-template" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_DEPLOY_USERNAME }}
          password: ${{ secrets.GHCR_DEPLOY_TOKEN }}

      - name: Build app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: runner
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.image.outputs.name }}:${{ env.IMAGE_TAG }}
          build-args: |
            BUILD_SHA=${{ github.sha }}
          cache-from: type=gha,scope=node-template-app
          cache-to: type=gha,mode=max,scope=node-template-app
